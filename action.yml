name: rootmark
description: >-
  Grounded verification for AGENTS.md and AI-agent instructions. Verifies that
  the Node/npm/pnpm commands written in AGENTS.md-style instruction files
  match the repository's actual package metadata, without executing anything,
  with an optional sticky PR summary comment.
author: Rootmark contributors
# NOTE: This action metadata lets the repository be consumed as a GitHub Action
# once it is released and tagged. Publishing to the GitHub Marketplace is a
# separate, manual release step and is NOT performed by adding this file.

branding:
  icon: shield
  color: blue

inputs:
  root:
    description: Root path to scan for instruction files.
    required: false
    default: "."
  fail-on:
    description: "Severity threshold that fails the job: error, warning, or off. Defaults to off (report-only) so the Action never fails a job unless the user explicitly opts in."
    required: false
    default: off
  comment:
    description: >-
      Post or update a sticky, top-level PR summary comment with findings.
      Only applies to pull_request events.
    required: false
    default: "false"
  github-token:
    description: Token used to post the PR summary comment when comment is true.
    required: false
    default: ${{ github.token }}
  node-version:
    description: Node.js version used to run the CLI.
    required: false
    default: "22"

outputs:
  findings-count:
    description: Total number of findings reported by the scan.
    value: ${{ steps.meta.outputs.findings-count }}
  json-path:
    description: Absolute path to the JSON results file written during the scan.
    value: ${{ steps.scan.outputs.json-path }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Scan instruction files (collect JSON)
      id: scan
      shell: bash
      env:
        ROOT: ${{ inputs.root }}
        RESULTS_JSON: ${{ runner.temp }}/rootmark-results.json
        TOOL_DIR: ${{ runner.temp }}/rootmark-tool
      run: |
        set -euo pipefail
        # Install the published CLI into an isolated temp directory FIRST. This
        # keeps npm install/resolution output in the step log and out of the
        # results file: only the scanner's own stdout is redirected to
        # RESULTS_JSON below. Mixing package-manager output into the JSON would
        # break the helper scripts that parse it (set-outputs / pr-comment /
        # enforce-threshold). --loglevel=error further trims npm chatter.
        #
        # The unpinned install resolves to the latest published version
        # (equivalent to @latest): convenient but mutable. Pin a version (e.g.
        # rootmark@0.1.4) for fully reproducible runs.
        mkdir -p "$TOOL_DIR"
        npm --prefix "$TOOL_DIR" install --no-audit --no-fund --loglevel=error rootmark

        # Collect findings with --fail-on off so the job can summarize and
        # comment before deciding whether to fail (see the enforce step below).
        "$TOOL_DIR/node_modules/.bin/rootmark" verify "$ROOT" --format json --fail-on off > "$RESULTS_JSON"
        echo "json-path=$RESULTS_JSON" >> "$GITHUB_OUTPUT"

    - name: Compute outputs
      id: meta
      shell: bash
      env:
        RESULTS_JSON: ${{ steps.scan.outputs.json-path }}
      run: node "${{ github.action_path }}/action/set-outputs.mjs"

    - name: Post or update PR summary comment
      if: ${{ inputs.comment == 'true' }}
      shell: bash
      env:
        RESULTS_JSON: ${{ steps.scan.outputs.json-path }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: node "${{ github.action_path }}/action/pr-comment.mjs"

    - name: Enforce fail-on threshold
      shell: bash
      env:
        RESULTS_JSON: ${{ steps.scan.outputs.json-path }}
        FAIL_ON: ${{ inputs.fail-on }}
      run: node "${{ github.action_path }}/action/enforce-threshold.mjs"
